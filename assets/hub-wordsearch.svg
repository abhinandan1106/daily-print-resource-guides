<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#F5F5F5"/>
  <!-- Letter grid -->
  <g transform="translate(240, 55)">
    <rect x="0" y="0" width="320" height="260" fill="white" stroke="#5B8C5A" stroke-width="2" rx="6"/>
    <!-- Letters grid -->
    <g font-family="Courier New, monospace" font-size="22" fill="#888" text-anchor="middle">
      <!-- Row 1 -->
      <text x="30" y="38">P</text><text x="70" y="38">R</text><text x="110" y="38">I</text>
      <text x="150" y="38">N</text><text x="190" y="38">T</text><text x="230" y="38">M</text>
      <text x="270" y="38">K</text><text x="295" y="38">W</text>
      <!-- Row 2 -->
      <text x="30" y="72">G</text><text x="70" y="72">A</text><text x="110" y="72">M</text>
      <text x="150" y="72">E</text><text x="190" y="72">S</text><text x="230" y="72">B</text>
      <text x="270" y="72">L</text><text x="295" y="72">D</text>
      <!-- Row 3 -->
      <text x="30" y="106">W</text><text x="70" y="106">O</text><text x="110" y="106">R</text>
      <text x="150" y="106">D</text><text x="190" y="106">S</text><text x="230" y="106">F</text>
      <text x="270" y="106">U</text><text x="295" y="106">N</text>
      <!-- Row 4 -->
      <text x="30" y="140">H</text><text x="70" y="140">Q</text><text x="110" y="140">X</text>
      <text x="150" y="140">J</text><text x="190" y="140">Z</text><text x="230" y="140">V</text>
      <text x="270" y="140">C</text><text x="295" y="140">Y</text>
      <!-- Row 5 -->
      <text x="30" y="174">D</text><text x="70" y="174">A</text><text x="110" y="174">I</text>
      <text x="150" y="174">L</text><text x="190" y="174">Y</text><text x="230" y="174">T</text>
      <text x="270" y="174">A</text><text x="295" y="174">E</text>
      <!-- Row 6 -->
      <text x="30" y="208">R</text><text x="70" y="208">P</text><text x="110" y="208">U</text>
      <text x="150" y="208">Z</text><text x="190" y="208">Z</text><text x="230" y="208">L</text>
      <text x="270" y="208">E</text><text x="295" y="208">S</text>
      <!-- Row 7 -->
      <text x="30" y="242">F</text><text x="70" y="242">B</text><text x="110" y="242">N</text>
      <text x="150" y="242">O</text><text x="190" y="242">K</text><text x="230" y="242">G</text>
      <text x="270" y="242">H</text><text x="295" y="242">I</text>
    </g>
    <!-- Highlighted words -->
    <rect x="12" y="20" width="200" height="28" fill="#5B8C5A" opacity="0.15" rx="12"/>
    <rect x="12" y="88" width="200" height="28" fill="#D4A843" opacity="0.2" rx="12"/>
    <rect x="12" y="156" width="200" height="28" fill="#4A7FB5" opacity="0.15" rx="12"/>
    <rect x="12" y="190" width="268" height="28" fill="#C67B5C" opacity="0.15" rx="12"/>
  </g>
  <!-- Title -->
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#5B8C5A" font-weight="bold">Word Search</text>
  <text x="400" y="408" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#888">Find hidden words in every direction</text>
</svg>