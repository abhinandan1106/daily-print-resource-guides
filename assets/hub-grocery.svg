<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#F5F5F5"/>
  <!-- Shopping list paper -->
  <g transform="translate(280, 40)">
    <rect x="0" y="0" width="200" height="280" fill="white" stroke="#5B8C5A" stroke-width="1.5" rx="6"/>
    <!-- Header -->
    <rect x="0" y="0" width="200" height="40" fill="#5B8C5A" opacity="0.1" rx="6"/>
    <rect x="0" y="30" width="200" height="10" fill="#5B8C5A" opacity="0.1"/>
    <text x="100" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#5B8C5A" font-weight="bold">Grocery List</text>
    <!-- List items -->
    <g font-family="Georgia, serif" font-size="13" fill="#555">
      <circle cx="25" cy="62" r="4" fill="#5B8C5A" opacity="0.5"/>
      <text x="38" y="66">Tomatoes</text>
      <circle cx="25" cy="88" r="4" fill="#5B8C5A" opacity="0.5"/>
      <text x="38" y="92">Fresh basil</text>
      <circle cx="25" cy="114" r="4" fill="#5B8C5A" opacity="0.5"/>
      <text x="38" y="118">Olive oil</text>
      <circle cx="25" cy="140" r="4" fill="#D4A843" opacity="0.5"/>
      <text x="38" y="144">Bread</text>
      <circle cx="25" cy="166" r="4" fill="#D4A843" opacity="0.5"/>
      <text x="38" y="170">Eggs</text>
      <circle cx="25" cy="192" r="4" fill="#C67B5C" opacity="0.5"/>
      <text x="38" y="196">Chicken</text>
      <circle cx="25" cy="218" r="4" fill="#C67B5C" opacity="0.5"/>
      <text x="38" y="222">Rice</text>
    </g>
    <!-- Checkmarks on first two -->
    <path d="M20,59 L24,63 L30,55" stroke="#5B8C5A" stroke-width="2" fill="none"/>
    <path d="M20,85 L24,89 L30,81" stroke="#5B8C5A" stroke-width="2" fill="none"/>
  </g>
  <!-- Vegetables -->
  <g transform="translate(520, 100)">
    <!-- Carrot -->
    <g transform="rotate(20)">
      <path d="M10,0 Q15,60 12,100 Q10,108 8,100 Q5,60 10,0" fill="#D4A843"/>
      <path d="M10,0 Q5,-15 0,-20" stroke="#5B8C5A" stroke-width="2" fill="none"/>
      <path d="M10,0 Q15,-12 20,-18" stroke="#5B8C5A" stroke-width="2" fill="none"/>
      <path d="M10,0 Q10,-16 10,-22" stroke="#5B8C5A" stroke-width="2" fill="none"/>
    </g>
    <!-- Tomato -->
    <g transform="translate(60, 60)">
      <circle cx="0" cy="0" r="28" fill="#C67B5C" opacity="0.7"/>
      <path d="M-5,-28 Q0,-35 5,-28" stroke="#5B8C5A" stroke-width="2" fill="#5B8C5A"/>
    </g>
    <!-- Broccoli -->
    <g transform="translate(30, 150)">
      <rect x="-4" y="15" width="8" height="30" fill="#5B8C5A" opacity="0.7"/>
      <circle cx="0" cy="10" r="16" fill="#5B8C5A" opacity="0.5"/>
      <circle cx="-12" cy="5" r="12" fill="#5B8C5A" opacity="0.4"/>
      <circle cx="12" cy="5" r="12" fill="#5B8C5A" opacity="0.4"/>
    </g>
  </g>
  <!-- Title -->
  <text x="400" y="388" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#5B8C5A" font-weight="bold">Grocery Lists</text>
  <text x="400" y="416" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#888">Never forget an ingredient</text>
</svg>