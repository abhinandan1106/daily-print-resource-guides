<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#F5F5F5"/>
  <!-- Clipboard -->
  <g transform="translate(270, 40)">
    <!-- Board -->
    <rect x="0" y="20" width="260" height="300" fill="#D4A843" opacity="0.25" stroke="#D4A843" stroke-width="2" rx="10"/>
    <!-- Clip -->
    <rect x="95" y="5" width="70" height="30" fill="#D4A843" rx="6" stroke="#C67B5C" stroke-width="1.5"/>
    <rect x="105" y="0" width="50" height="15" fill="#888" rx="4"/>
    <!-- Paper -->
    <rect x="20" y="40" width="220" height="260" fill="white" rx="4"/>
    <!-- Header -->
    <text x="130" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#D4A843" font-weight="bold">To Do</text>
    <line x1="40" y1="82" x2="220" y2="82" stroke="#D4A843" stroke-width="0.5" opacity="0.5"/>
    <!-- Checklist items -->
    <g transform="translate(40, 100)">
      <!-- Item 1 - checked -->
      <rect x="0" y="0" width="18" height="18" fill="none" stroke="#5B8C5A" stroke-width="1.5" rx="3"/>
      <path d="M3,9 L7,14 L15,4" stroke="#5B8C5A" stroke-width="2.5" fill="none"/>
      <text x="28" y="14" font-family="Georgia, serif" font-size="14" fill="#888" text-decoration="line-through">Clean kitchen</text>
      <!-- Item 2 - checked -->
      <rect x="0" y="35" width="18" height="18" fill="none" stroke="#5B8C5A" stroke-width="1.5" rx="3"/>
      <path d="M3,44 L7,49 L15,39" stroke="#5B8C5A" stroke-width="2.5" fill="none"/>
      <text x="28" y="49" font-family="Georgia, serif" font-size="14" fill="#888" text-decoration="line-through">Do laundry</text>
      <!-- Item 3 - unchecked -->
      <rect x="0" y="70" width="18" height="18" fill="none" stroke="#D4A843" stroke-width="1.5" rx="3"/>
      <text x="28" y="84" font-family="Georgia, serif" font-size="14" fill="#555">Vacuum floors</text>
      <!-- Item 4 - unchecked -->
      <rect x="0" y="105" width="18" height="18" fill="none" stroke="#D4A843" stroke-width="1.5" rx="3"/>
      <text x="28" y="119" font-family="Georgia, serif" font-size="14" fill="#555">Organize closet</text>
      <!-- Item 5 - unchecked -->
      <rect x="0" y="140" width="18" height="18" fill="none" stroke="#D4A843" stroke-width="1.5" rx="3"/>
      <text x="28" y="154" font-family="Georgia, serif" font-size="14" fill="#555">Water plants</text>
    </g>
  </g>
  <!-- Title -->
  <text x="400" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#D4A843" font-weight="bold">Household Checklists</text>
  <text x="400" y="428" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#888">Keep your home running smoothly</text>
</svg>