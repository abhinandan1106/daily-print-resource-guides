<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#F5F5F5"/>
  <!-- Crossword grid -->
  <g transform="translate(250, 70)">
    <rect x="0" y="0" width="220" height="220" fill="white" stroke="#4A7FB5" stroke-width="2" rx="4"/>
    <!-- Vertical lines -->
    <line x1="44" y1="0" x2="44" y2="220" stroke="#4A7FB5" stroke-width="1" opacity="0.4"/>
    <line x1="88" y1="0" x2="88" y2="220" stroke="#4A7FB5" stroke-width="1" opacity="0.4"/>
    <line x1="132" y1="0" x2="132" y2="220" stroke="#4A7FB5" stroke-width="1" opacity="0.4"/>
    <line x1="176" y1="0" x2="176" y2="220" stroke="#4A7FB5" stroke-width="1" opacity="0.4"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="44" x2="220" y2="44" stroke="#4A7FB5" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="88" x2="220" y2="88" stroke="#4A7FB5" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="132" x2="220" y2="132" stroke="#4A7FB5" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="176" x2="220" y2="176" stroke="#4A7FB5" stroke-width="1" opacity="0.4"/>
    <!-- Black squares -->
    <rect x="0" y="0" width="44" height="44" fill="#333"/>
    <rect x="176" y="0" width="44" height="44" fill="#333"/>
    <rect x="88" y="88" width="44" height="44" fill="#333"/>
    <rect x="0" y="176" width="44" height="44" fill="#333"/>
    <rect x="176" y="176" width="44" height="44" fill="#333"/>
    <!-- Some letters -->
    <text x="66" y="33" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#4A7FB5">W</text>
    <text x="110" y="33" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#4A7FB5">O</text>
    <text x="154" y="33" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#4A7FB5">R</text>
    <text x="22" y="77" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#4A7FB5">D</text>
  </g>
  <!-- Pen -->
  <g transform="translate(500, 200) rotate(40)">
    <rect x="0" y="0" width="100" height="12" fill="#4A7FB5" rx="2"/>
    <polygon points="100,0 100,12 114,6" fill="#333"/>
    <rect x="0" y="0" width="15" height="12" fill="#333" rx="2" opacity="0.6"/>
    <rect x="0" y="3" width="100" height="2" fill="white" opacity="0.2"/>
  </g>
  <!-- Title -->
  <text x="400" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#4A7FB5" font-weight="bold">Crossword Puzzles</text>
  <text x="400" y="398" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#888">Classic wordplay challenges</text>
</svg>