<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#F5F5F5"/>
  <!-- Calendar -->
  <g transform="translate(260, 50)">
    <!-- Shadow -->
    <rect x="4" y="4" width="280" height="280" fill="#ddd" rx="8"/>
    <!-- Calendar body -->
    <rect x="0" y="0" width="280" height="280" fill="white" stroke="#C67B5C" stroke-width="2" rx="8"/>
    <!-- Header -->
    <rect x="0" y="0" width="280" height="55" fill="#C67B5C" rx="8"/>
    <rect x="0" y="35" width="280" height="20" fill="#C67B5C"/>
    <text x="140" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="white" font-weight="bold">MARCH</text>
    <!-- Pushpin -->
    <circle cx="140" cy="-5" r="10" fill="#D4A843" stroke="#C67B5C" stroke-width="1"/>
    <circle cx="140" cy="-5" r="4" fill="white" opacity="0.5"/>
    <!-- Day labels -->
    <g font-family="Georgia, serif" font-size="12" fill="#888" text-anchor="middle">
      <text x="30" y="78">S</text><text x="70" y="78">M</text><text x="110" y="78">T</text>
      <text x="150" y="78">W</text><text x="190" y="78">T</text><text x="230" y="78">F</text><text x="260" y="78">S</text>
    </g>
    <!-- Dates -->
    <g font-family="Georgia, serif" font-size="15" fill="#555" text-anchor="middle">
      <text x="30" y="105">1</text><text x="70" y="105">2</text><text x="110" y="105">3</text>
      <text x="150" y="105">4</text><text x="190" y="105">5</text><text x="230" y="105">6</text><text x="260" y="105">7</text>
      <text x="30" y="135">8</text><text x="70" y="135">9</text><text x="110" y="135">10</text>
      <text x="150" y="135">11</text><text x="190" y="135">12</text><text x="230" y="135">13</text><text x="260" y="135">14</text>
      <text x="30" y="165">15</text><text x="70" y="165">16</text><text x="110" y="165">17</text>
      <text x="150" y="165">18</text><text x="190" y="165">19</text><text x="230" y="165">20</text><text x="260" y="165">21</text>
      <text x="30" y="195">22</text><text x="70" y="195">23</text><text x="110" y="195">24</text>
      <text x="150" y="195">25</text><text x="190" y="195">26</text><text x="230" y="195">27</text><text x="260" y="195">28</text>
      <text x="30" y="225">29</text><text x="70" y="225">30</text><text x="110" y="225">31</text>
    </g>
    <!-- Circled/marked dates -->
    <circle cx="110" cy="100" r="14" fill="none" stroke="#C67B5C" stroke-width="2"/>
    <circle cx="190" cy="160" r="14" fill="#D4A843" opacity="0.25"/>
    <circle cx="70" cy="190" r="14" fill="#5B8C5A" opacity="0.2"/>
  </g>
  <!-- Title -->
  <text x="400" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#C67B5C" font-weight="bold">Calendars</text>
  <text x="400" y="428" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#888">Printable monthly and weekly layouts</text>
</svg>