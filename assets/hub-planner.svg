<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#F5F5F5"/>
  <!-- Open planner - left page -->
  <g transform="translate(180, 70)">
    <rect x="0" y="0" width="200" height="260" fill="white" stroke="#4A7FB5" stroke-width="1.5" rx="4"/>
    <!-- Lined paper -->
    <line x1="20" y1="40" x2="180" y2="40" stroke="#4A7FB5" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="65" x2="180" y2="65" stroke="#4A7FB5" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="90" x2="180" y2="90" stroke="#4A7FB5" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="115" x2="180" y2="115" stroke="#4A7FB5" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="140" x2="180" y2="140" stroke="#4A7FB5" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="165" x2="180" y2="165" stroke="#4A7FB5" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="190" x2="180" y2="190" stroke="#4A7FB5" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="215" x2="180" y2="215" stroke="#4A7FB5" stroke-width="0.5" opacity="0.3"/>
    <!-- Header -->
    <text x="100" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#4A7FB5" font-weight="bold">Monday</text>
    <!-- Written content -->
    <rect x="25" y="44" width="120" height="6" fill="#888" opacity="0.2" rx="3"/>
    <rect x="25" y="69" width="100" height="6" fill="#888" opacity="0.2" rx="3"/>
    <rect x="25" y="94" width="130" height="6" fill="#888" opacity="0.2" rx="3"/>
    <rect x="25" y="119" width="80" height="6" fill="#888" opacity="0.2" rx="3"/>
  </g>
  <!-- Right page -->
  <g transform="translate(385, 70)">
    <rect x="0" y="0" width="200" height="260" fill="white" stroke="#4A7FB5" stroke-width="1.5" rx="4"/>
    <!-- Lines -->
    <line x1="20" y1="40" x2="180" y2="40" stroke="#4A7FB5" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="65" x2="180" y2="65" stroke="#4A7FB5" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="90" x2="180" y2="90" stroke="#4A7FB5" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="115" x2="180" y2="115" stroke="#4A7FB5" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="140" x2="180" y2="140" stroke="#4A7FB5" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="165" x2="180" y2="165" stroke="#4A7FB5" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="190" x2="180" y2="190" stroke="#4A7FB5" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="215" x2="180" y2="215" stroke="#4A7FB5" stroke-width="0.5" opacity="0.3"/>
    <text x="100" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#4A7FB5" font-weight="bold">Tuesday</text>
    <rect x="25" y="44" width="110" height="6" fill="#888" opacity="0.2" rx="3"/>
    <rect x="25" y="69" width="90" height="6" fill="#888" opacity="0.2" rx="3"/>
  </g>
  <!-- Spine -->
  <rect x="378" y="70" width="9" height="260" fill="#4A7FB5" opacity="0.15" rx="2"/>
  <!-- Pen -->
  <g transform="translate(550, 250) rotate(25)">
    <rect x="0" y="0" width="90" height="10" fill="#4A7FB5" rx="2"/>
    <polygon points="90,0 90,10 102,5" fill="#333"/>
    <rect x="0" y="0" width="12" height="10" fill="#D4A843" rx="2"/>
  </g>
  <!-- Title -->
  <text x="400" y="390" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#4A7FB5" font-weight="bold">Weekly Planner</text>
  <text x="400" y="418" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#888">Stay organized day by day</text>
</svg>